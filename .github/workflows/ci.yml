name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Format, vet, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check workflow action versions
        shell: bash
        run: ./scripts/check-workflow-actions.sh

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Check go.mod/go.sum are tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          if [ -n "$(git status --porcelain -- go.mod go.sum)" ]; then
            echo "go.mod/go.sum are not tidy. Run 'go mod tidy' locally." >&2
            git status --short -- go.mod go.sum >&2
            git diff -- go.mod go.sum >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Build CLI
        run: go build -trimpath -ldflags="-s -w" ./cmd/airlock-certctl

  govulncheck:
    name: Scan Go vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOTOOLCHAIN: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go for govulncheck
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - name: Show Go toolchain
        shell: bash
        run: |
          set -euo pipefail
          go version
          go env GOTOOLCHAIN

      - name: Run govulncheck
        shell: bash
        run: |
          set -euo pipefail
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...
