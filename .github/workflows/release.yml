name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release tag and run tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Validate release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${REQUESTED_TAG#refs/tags/}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v0.1.0 or v0.1.0-rc.1. Got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Release tag: $tag"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release-tag.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Check workflow action versions
        shell: bash
        run: ./scripts/check-workflow-actions.sh

      - name: Set up project Go version
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          files="$(gofmt -l $(find . -type f -name '*.go' -not -path './vendor/*'))"
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Check go.mod/go.sum are tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          if [ -n "$(git status --porcelain -- go.mod go.sum)" ]; then
            echo "go.mod/go.sum are not tidy. Run 'go mod tidy' locally." >&2
            git status --short -- go.mod go.sum >&2
            git diff -- go.mod go.sum >&2
            exit 1
          fi

      - name: Vet
        shell: bash
        run: |
          set -euo pipefail
          go vet ./...

      - name: Test with race detector
        shell: bash
        run: |
          set -euo pipefail
          go test -race ./...

      - name: Build CLI
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -ldflags="-s -w" ./cmd/airlock-certctl

      - name: Set up Go for govulncheck
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - name: Run govulncheck
        shell: bash
        env:
          GOTOOLCHAIN: auto
        run: |
          set -euo pipefail
          go version
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  publish:
    name: Publish GitHub release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RELEASE_TAG: ${{ needs.verify.outputs.tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check whether release already exists
        id: existing-release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Release already exists::GitHub Release $RELEASE_TAG already exists. Skipping GoReleaser publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        if: ${{ steps.existing-release.outputs.exists != 'true' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
