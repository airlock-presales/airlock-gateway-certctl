name: Scan Go vulnerabilities

on:
  schedule:
    - cron: "20 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: govulncheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    name: Scan Go vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GOTOOLCHAIN: auto

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go for govulncheck
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - name: Show Go toolchain
        shell: bash
        run: |
          set -euo pipefail
          go version
          go env GOTOOLCHAIN

      - name: Run govulncheck
        shell: bash
        run: |
          set -euo pipefail
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...
